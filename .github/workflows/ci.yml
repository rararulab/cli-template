name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  rust:
    name: Rust
    uses: ./.github/workflows/rust.yml

  npm-validate:
    name: Validate npm Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Substitute template placeholders
        run: |
          find npm/ -type f \( -name '*.json' -o -name '*.js' -o -name '*.md' \) \
            -exec sed -i 's/{{project-name}}/ci-test-app/g; s/{{github-org}}/rararulab/g; s/{{crate_name}}/ci_test_app/g' {} +

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate package.json
        run: |
          cd npm
          node -e "import{readFileSync as r}from'node:fs';const p=JSON.parse(r('package.json','utf8'));console.log('Package:',p.name,p.version);if(!p.bin)throw new Error('Missing bin entry');" --input-type=module

      - name: Check npm pack (dry run)
        run: |
          cd npm
          npm pack --dry-run

